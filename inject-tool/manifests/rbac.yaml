apiVersion: v1
kind: ServiceAccount
metadata:
  name: inject-tool-service
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: inject-tool-service
rules:
  - apiGroups: ["workspace.devfile.io"]
    resources: ["devworkspaces"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: inject-tool-service
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: inject-tool-service
subjects:
  - kind: ServiceAccount
    name: inject-tool-service
