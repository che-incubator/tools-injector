name: PR Build

on:
  pull_request:
    branches: ['*']

jobs:

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_tools: ${{ steps.set-matrix.outputs.has_tools }}
    steps:
      - name: "Checkout source code"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: "Get changed files"
        id: changed
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git diff --name-only "origin/${BASE_REF}...HEAD" > changed_files.txt
          echo "Changed files:"
          cat changed_files.txt

      - name: "Build tool matrix from changed files"
        id: set-matrix
        run: |
          TOOLS='opencode goose claude-code kilocode gemini-cli tmux python3 gh'
          REBUILD_ALL=false

          if grep -q '^\.github/workflows/pr\.yml' changed_files.txt; then
            REBUILD_ALL=true
          fi

          MATRIX="["
          FIRST=true
          for TOOL in $TOOLS; do
            if [ "$REBUILD_ALL" = "true" ] || grep -q "^dockerfiles/${TOOL}/" changed_files.txt; then
              if [ "$FIRST" = "true" ]; then
                FIRST=false
              else
                MATRIX="${MATRIX},"
              fi
              if [ "$TOOL" = "gemini-cli" ]; then
                PLATFORMS="linux/amd64,linux/arm64,linux/s390x,linux/ppc64le"
              else
                PLATFORMS="linux/amd64,linux/arm64"
              fi
              MATRIX="${MATRIX}{\"name\":\"${TOOL}\",\"dockerfile\":\"dockerfiles/${TOOL}\",\"platforms\":\"${PLATFORMS}\"}"
            fi
          done
          MATRIX="${MATRIX}]"

          if [ "$MATRIX" = "[]" ]; then
            echo "has_tools=false" >> "$GITHUB_OUTPUT"
            echo "No tool changes detected, skipping builds"
          else
            echo "has_tools=true" >> "$GITHUB_OUTPUT"
            echo "Tools to build: ${MATRIX}"
          fi
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"

  build-tools:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_tools == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tool: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    env:
      IMAGE: quay.io/che-incubator/tools-injector/${{ matrix.tool.name }}
      TAG: pr-${{ github.event.pull_request.number }}
    steps:
      -
        name: "Checkout source code"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      -
        name: "Set up QEMU"
        uses: docker/setup-qemu-action@v3
      -
        name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3
      -
        name: "Docker quay.io Login"
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      -
        name: "Build and push ${{ matrix.tool.name }}"
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.tool.dockerfile }}/Dockerfile
          platforms: ${{ matrix.tool.platforms || 'linux/amd64,linux/arm64' }}
          push: true
          tags: ${{ env.IMAGE }}:${{ env.TAG }}
      -
        name: "Set tag expiration (14 days)"
        continue-on-error: true
        run: |
          EXPIRATION=$(date -u -d '+14 days' +%s)
          curl -s -X PUT \
            -H "Authorization: Bearer ${{ secrets.QUAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"expiration\": ${EXPIRATION}}" \
            "https://quay.io/api/v1/repository/che-incubator/tools-injector%2F${{ matrix.tool.name }}/tag/${{ env.TAG }}"
