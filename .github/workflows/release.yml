name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  build-tools:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tool:
          - name: opencode
            dockerfile: dockerfiles/opencode
          - name: goose
            dockerfile: dockerfiles/goose
          - name: claude-code
            dockerfile: dockerfiles/claude-code
          - name: kilocode
            dockerfile: dockerfiles/kilocode
          - name: gemini-cli
            dockerfile: dockerfiles/gemini-cli
          - name: tmux
            dockerfile: dockerfiles/tmux
          - name: python3
            dockerfile: dockerfiles/python3
    env:
      IMAGE: quay.io/che-incubator/tools-injector/${{ matrix.tool.name }}
      TAG: next

    steps:
      -
        name: "Checkout source code"
        uses: actions/checkout@v4
      -
        name: "Set up QEMU"
        uses: docker/setup-qemu-action@v3
      -
        name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3
      -
        name: "Docker quay.io Login"
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      -
        name: "Build and push ${{ matrix.tool.name }}"
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.tool.dockerfile }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE }}:${{ env.TAG }}
